for(const[wid,keywords]of Object.entries(kwMap)){
if(keywords.some(kw=>text.includes(kw)))matched.add(wid);
}
// Also check for "отделочные работы" as a group -> w16,w17,w18,w19,w20,w21
if(text.includes('отделочные работы')){['w16','w17','w18','w19','w20','w21'].forEach(id=>matched.add(id))}
res(matched)}catch(err){rej(err)}};r.onerror=rej;r.readAsArrayBuffer(file)})}
async function handleKP(file){if(!file)return;const matched=await parseKP(file);matched.forEach(id=>S.sw.add(id));S.kpMsg='✅ Из КП подобрано работ: '+matched.size;render()}

// RENDER
function render(){document.getElementById('stepsBar').innerHTML=STEPS.map((n,i)=>`<div class="step-item ${S.step===i?'active':''} ${S.step>i?'done':''}" onclick="if(${i}<=${S.step}){S.step=${i};render()}">${n}</div>`).join('');const el=document.getElementById('app');[rUpload,rCompany,rType,rParams,rGenerate][S.step](el)}

function rUpload(el){
// Reset all data for new application
S.company={};S.iso={consultant:'Клепицкая Виктория Александровна',scope:'выполнение функций генерального подрядчика, производство строительно-монтажных работ',yearImplemented:'2026',subdivisions:'нет',prevCert:'нет'};S.cert={standard:'',productName:'',tnved:'',okp:'',production:'Серийно',scheme:'1С'};S.spk={headPosition:'',headName:''};S.sw=new Set();S.responsible={};S.bxS='';S.bxR=[];S.bxL=false;S.gen=false;S.done=false;S.ws='';S.kpMsg='';
el.innerHTML=`<div class="upload-zone" id="dz" onclick="document.getElementById('fi').click()"><input type="file" id="fi" accept=".docx" hidden><div class="upload-icon">📄</div><div class="upload-title">Загрузите счёт-заказ или договор</div><div class="upload-sub">Перетащите .docx файл или нажмите для выбора</div></div><div id="us"></div><div style="text-align:center;margin-top:12px"><button class="btn btn-s" onclick="S.step=1;render()">Пропустить (ввести вручную)</button></div>`;const z=document.getElementById('dz'),fi=document.getElementById('fi');z.ondragover=e=>{e.preventDefault();z.classList.add('drag')};z.ondragleave=()=>z.classList.remove('drag');z.ondrop=e=>{e.preventDefault();z.classList.remove('drag');doFile(e.dataTransfer.files[0])};fi.onchange=()=>doFile(fi.files[0])}
async function doFile(f){if(!f)return;document.getElementById('us').innerHTML='<div style="text-align:center;padding:20px"><div class="spin"></div>Извлекаю реквизиты...</div>';try{S.company=await parseInvoice(f);if(S.company.directorName)S.iso.representative=(S.company.directorPosition||'Директор')+' '+S.company.directorName;S.step=1;render()}catch(e){document.getElementById('us').innerHTML='<div class="status err">Ошибка: '+e.message+'</div>'}}

function rCompany(el){const f=(k,l,fw)=>`<div class="field ${fw?'fw':''}"><label>${l}</label><input type="text" value="${E(S.company[k]||'')}" onchange="S.company['${k}']=this.value"></div>`;el.innerHTML=`<div class="card"><div class="card-title">📇 Реквизиты заказчика</div><div class="card-sub">Проверьте данные из счёта-заказа.</div><div class="fg">${f('companyName','Наименование организации',1)}${f('legalAddress','Юридический адрес',1)}${f('bankAccount','Расчётный счёт (IBAN)')}${f('bankName','Банк')}${f('bik','БИК')}${f('bankAddress','Адрес банка')}${f('unp','УНП (рег. номер в ЕГР)')}${f('phone','Телефон')}${f('email','E-mail')}${f('directorPosition','Должность руководителя')}${f('directorName','ФИО руководителя')}</div></div><div class="actions"><button class="btn btn-s" onclick="S.step=0;render()">← Назад</button><button class="btn btn-p" onclick="S.step=2;render()">Далее →</button></div>`}

function rType(el){el.innerHTML=`<div class="card"><div class="card-title">📝 Тип заявки</div><div class="type-grid">${TYPES.map(t=>`<div class="type-card ${S.appType===t.id?'sel':''}" style="--accent:${t.color}" onclick="S.appType='${t.id}';render()"><div class="icon">${t.icon}</div><div class="nm">${t.label}</div><div class="ds">${t.desc}</div></div>`).join('')}</div></div><div class="actions"><button class="btn btn-s" onclick="S.step=1;render()">← Назад</button><button class="btn btn-p" onclick="S.step=3;render()">Далее →</button></div>`}

function rParams(el){const f=(o,k,l,fw,ph)=>`<div class="field ${fw?'fw':''}"><label>${l}</label><input type="text" value="${E(S[o][k]||'')}" placeholder="${ph||''}" onchange="S['${o}']['${k}']=this.value"></div>`;const isI=S.appType==='bsc'||S.appType==='beltechexpert',isC=S.appType==='cert_metal',isS=S.appType==='stroycomplex'||S.appType==='bisp';
const iH=isI?`<div class="card"><div class="card-title">📊 Сведения о системе менеджмента</div><div class="fg">${f('iso','yearImplemented','Год внедрения',0,'2026')}${f('iso','employeeCount','Количество работников',0,'15')}${f('iso','scope','Область применения',1,'производство строительно-монтажных работ')}${f('iso','consultant','Консультирование проводил',1,'Клепицкая Виктория Александровна')}${f('iso','subdivisions','Наличие обособленных подразделений',0,'нет')}${f('iso','prevCert','Предыдущий сертификат',0,'нет')}${f('iso','representative','Представитель руководства',1,'')}${f('iso','contactPerson','Контактное лицо',0,'')}${f('iso','contactPhone','Телефон контактного лица',0,'')}</div></div>`:'';
const cH=isC?`<div class="card"><div class="card-title">⚙️ Данные для сертификации продукции</div><div class="fg"><div class="field fw"><label>Стандарт</label><select onchange="selStd(this.value)"><option value="">Выберите...</option>${CERTS.map(s=>`<option value="${s.id}" ${S.cert.standard===s.id?'selected':''}>${s.label} — ${s.fn}</option>`).join('')}</select></div>${f('cert','productName','Наименование продукции',1)}${f('cert','tnved','Код ТН ВЭД ЕАЭС')}${f('cert','okp','Код ОКП РБ')}<div class="field"><label>Выпускается</label><select onchange="S.cert.production=this.value"><option ${S.cert.production==='Серийно'?'selected':''}>Серийно</option><option ${S.cert.production==='Партия'?'selected':''}>Партия</option><option ${S.cert.production==='Единичное изделие'?'selected':''}>Единичное изделие</option></select></div>${f('cert','scheme','Схема сертификации',0,'1С')}</div></div>`:'';
const sH=isS?`<div class="card"><div class="card-title">📑 Дополнительные данные для СПК</div><div class="fg">${f('spk','headPosition','Должность руководителя',0,'Директор')}${f('spk','headName','ФИО руководителя',0,'')}</div></div><div class="card"><div class="card-title">🔧 Виды работ (${S.sw.size} из ${W.length})</div><div class="card-sub">Выберите вручную или загрузите КП для автоподбора</div><div style="display:flex;gap:8px;margin-bottom:10px;align-items:center"><button class="btn-bx" onclick="document.getElementById('kpFile').click()" style="background:#7c3aed">📄 Загрузить КП</button><input type="file" id="kpFile" accept=".docx" hidden onchange="handleKP(this.files[0])"><button class="btn-bx" onclick="S.sw.clear();S.kpMsg='';render()" style="background:#94a3b8">Сбросить все</button>${S.kpMsg?'<span style="font-size:13px;color:#059669;font-weight:500">'+S.kpMsg+'</span>':''}</div><input class="search-input" placeholder="🔍 Поиск..." value="${E(S.ws)}" oninput="S.ws=this.value;render()"><div class="wt-list">${W.filter(w=>!S.ws||w.c.toLowerCase().includes(S.ws.toLowerCase())||w.s.toLowerCase().includes(S.ws.toLowerCase())).map(w=>`<div class="wt-item ${S.sw.has(w.id)?'checked':''}" onclick="tgW('${w.id}')"><input type="checkbox" ${S.sw.has(w.id)?'checked':''}><div><div class="wt-nm">${w.c}</div><div class="wt-tnpa">${w.t} → ${w.k}</div>${w.s?`<div class="wt-sub">${w.s.split(';').slice(0,3).join('; ')}${w.s.split(';').length>3?' ...':''}</div>`:''}</div></div>`).join('')}</div><div class="wt-count">Выбрано: ${S.sw.size} из ${W.length}</div></div>`:'';
const bxH=S.bxR.length>0?`<div style="margin-top:8px;border:1px solid #e2e8f0;border-radius:7px;max-height:150px;overflow-y:auto">${S.bxR.map(u=>`<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:13px;display:flex;justify-content:space-between" onclick="S.responsible.name='${E(u.name)}';S.responsible.phone='${E(u.phone)}';S.bxR=[];render()"><span>${u.name}</span><span style="color:#64748b">${u.phone}</span></div>`).join('')}</div>`:'';
el.innerHTML=`${iH}${cH}${sH}<div class="card"><div class="card-title">👤 Ответственный исполнитель</div><div class="card-sub">Найдите в Битрикс24 или введите вручную</div><div class="bx-row"><input type="text" value="${E(S.bxS)}" placeholder="Имя сотрудника..." oninput="S.bxS=this.value"><button class="btn-bx" onclick="doBx()" ${S.bxL?'disabled':''}>${S.bxL?'⏳':'🔍 Найти'}</button></div>${bxH}<div class="fg" style="margin-top:10px">${f('responsible','name','ФИО ответственного')}${f('responsible','phone','Телефон ответственного')}</div></div><div class="actions"><button class="btn btn-s" onclick="S.step=2;render()">← Назад</button><button class="btn btn-p" onclick="S.step=4;render()">Далее →</button></div>`}

function rGenerate(el){const c=S.company,r=S.responsible,tl=TYPES.find(t=>t.id===S.appType)?.label||'',isC=S.appType==='cert_metal',isS=S.appType==='stroycomplex'||S.appType==='bisp';
el.innerHTML=`<div class="card"><div class="card-title">🎯 Готово к генерации</div><div class="card-sub">Проверьте данные и нажмите «Сгенерировать заявку»</div><div style="display:grid;gap:6px;font-size:13px"><div><strong>Тип:</strong> ${tl}</div><div><strong>Организация:</strong> ${c.companyName||'—'}</div><div><strong>УНП:</strong> ${c.unp||'—'}</div><div><strong>Руководитель:</strong> ${c.directorName||'—'}</div>${isC?`<div><strong>Стандарт:</strong> ${CERTS.find(s=>s.id===S.cert.standard)?.label||'—'}</div>`:isS?`<div><strong>Видов работ:</strong> ${S.sw.size}</div>`:`<div><strong>Работников:</strong> ${S.iso.employeeCount||'—'}</div>`}<div><strong>Ответственный:</strong> ${r.name||'не указан'}</div></div></div>${S.done?'<div class="status ok">✅ Заявка сгенерирована и скачана!</div>':''}<div class="actions"><button class="btn btn-s" onclick="S.step=3;render()">← Назад</button><button class="btn btn-gen" onclick="doGen()" ${S.gen?'disabled':''}>${S.gen?'⏳ Генерирую...':'📥 Сгенерировать заявку (.docx)'}</button></div>`}

// ACTIONS
function tgW(id){if(S.sw.has(id))S.sw.delete(id);else S.sw.add(id);render()}
function selStd(id){S.cert.standard=id;const s=CERTS.find(x=>x.id===id);if(s){S.cert.productName=s.prod;S.cert.tnved=s.tv;S.cert.okp=s.okp}render()}
async function doBx(){if(!S.bxS||S.bxS.length<2)return;S.bxL=true;render();S.bxR=await searchUsers(S.bxS);S.bxL=false;render()}
async function doGen(){S.gen=true;S.done=false;render();try{let doc,pfx='Заявка';if(S.appType==='bsc'){doc=genBSC(S.company,S.iso,S.responsible);pfx='Заявка_БСЦ'}else if(S.appType==='beltechexpert'){doc=genBTE(S.company,S.iso,S.responsible);pfx='Заявка_БелТехЭкспертиза'}else if(S.appType==='cert_metal'){doc=genCert(S.company,S.cert,S.responsible);pfx='Заявка_серт_'+(CERTS.find(s=>s.id===S.cert.standard)?.label||'').replace(/\s/g,'_')}else if(S.appType==='stroycomplex'){doc=genSK(S.company,S.spk,S.sw,S.responsible);pfx='Заявка_Стройкомплекс_СПК'}else if(S.appType==='bisp'){doc=genBISP(S.company,S.spk,S.sw,S.responsible);pfx='Заявка_БИСП_СПК'}const buf=await docx.Packer.toBlob(doc);saveAs(buf,pfx+'_'+(S.company.companyName||'').replace(/[«»"']/g,'').substring(0,30)+'.docx');S.done=true}catch(e){alert('Ошибка: '+e.message)}S.gen=false;render()}
function E(s){return(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;')}
render();
</script>
