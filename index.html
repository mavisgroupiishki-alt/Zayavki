// ACTIONS
function tgW(id){if(S.sw.has(id))S.sw.delete(id);else S.sw.add(id);render()}
function selStd(id){S.cert.standard=id;const s=CERTS.find(x=>x.id===id);if(s){S.cert.productName=s.prod;S.cert.tnved=s.tv;S.cert.okp=s.okp}render()}
async function doBx(){if(!S.bxS||S.bxS.length<2)return;S.bxL=true;render();S.bxR=await searchUsers(S.bxS);S.bxL=false;render()}
async function doGen(){S.gen=true;S.done=false;render();try{let doc,pfx='Заявка',isTemplate=false;if(S.appType==='bsc'){doc=genBSC(S.company,S.iso,S.responsible);pfx='Заявка_БСЦ'}else if(S.appType==='beltechexpert'){doc=genBTE(S.company,S.iso,S.responsible);pfx='Заявка_БелТехЭкспертиза'}else if(S.appType==='cert_metal'){const blob=await genCertFromTemplate(S.company,S.cert,S.responsible);pfx='Заявка_серт_'+(CERTS.find(s=>s.id===S.cert.standard)?.label||'').replace(/\s/g,'_');saveAs(blob,pfx+'_'+(S.company.companyName||'').replace(/[«»"']/g,'').substring(0,30)+'.docx');S.done=true;S.gen=false;render();return}else if(S.appType==='stroycomplex'){doc=genSK(S.company,S.spk,S.sw,S.responsible);pfx='Заявка_Стройкомплекс_СПК'}else if(S.appType==='bisp'){doc=genBISP(S.company,S.spk,S.sw,S.responsible);pfx='Заявка_БИСП_СПК'}const buf=await docx.Packer.toBlob(doc);saveAs(buf,pfx+'_'+(S.company.companyName||'').replace(/[«»"']/g,'').substring(0,30)+'.docx');S.done=true}catch(e){alert('Ошибка: '+e.message)}S.gen=false;render()}
function E(s){return(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;')}

// ===================== MODULE SWITCHER =====================
function switchModule(mod){
  document.getElementById('moduleZayavki').style.display=mod==='zayavki'?'':'none';
  document.getElementById('moduleScan').style.display=mod==='scan'?'':'none';
  document.getElementById('tabZayavki').classList.toggle('active',mod==='zayavki');
  document.getElementById('tabScan').classList.toggle('active',mod==='scan');
  if(mod==='scan')renderScan();
}

// ===================== SCAN ENHANCER =====================
let scanState={img:null,fileName:'',brightness:0,contrast:30,sharpness:30,whiten:20};

function renderScan(){
  const el=document.getElementById('scanApp');
  if(!scanState.img){
    el.innerHTML=`
    <div class="card">
      <div class="card-title">🔍 Улучшатель сканов</div>
      <div class="card-sub">Загрузите скан документа (диплом, трудовая, паспорт и т.д.) для улучшения качества</div>
      <div class="scan-zone" id="scanDz" onclick="document.getElementById('scanFi').click()">
        <input type="file" id="scanFi" accept="image/*,.pdf" hidden>
        <div class="upload-icon">📷</div>
        <div class="upload-title">Загрузите скан</div>
        <div class="upload-sub">JPG, PNG или перетащите файл</div>
      </div>
    </div>`;
    const z=document.getElementById('scanDz'),fi=document.getElementById('scanFi');
    z.ondragover=e=>{e.preventDefault();z.classList.add('drag')};
    z.ondragleave=()=>z.classList.remove('drag');
    z.ondrop=e=>{e.preventDefault();z.classList.remove('drag');loadScanFile(e.dataTransfer.files[0])};
    fi.onchange=()=>loadScanFile(fi.files[0]);
    return;
  }
  
  el.innerHTML=`
  <div class="card">
    <div class="card-title">🔍 Улучшатель сканов</div>
    <div class="scan-actions">
      <button class="btn btn-p" onclick="autoEnhance()">⚡ Авто-улучшение</button>
      <button class="btn btn-s" onclick="resetSliders()">↩️ Сброс</button>
      <button class="btn btn-gen" onclick="downloadScan()">📥 Скачать результат</button>
      <button class="btn btn-s" onclick="scanState.img=null;renderScan()">🗑️ Другой файл</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">⚙️ Настройки</div>
    <div class="slider-row">
      <label>Яркость</label>
      <input type="range" min="-100" max="100" value="${scanState.brightness}" oninput="scanState.brightness=+this.value;this.nextElementSibling.textContent=this.value;applyScan()">
      <span class="val">${scanState.brightness}</span>
    </div>
    <div class="slider-row">
      <label>Контраст</label>
      <input type="range" min="-100" max="100" value="${scanState.contrast}" oninput="scanState.contrast=+this.value;this.nextElementSibling.textContent=this.value;applyScan()">
      <span class="val">${scanState.contrast}</span>
    </div>
    <div class="slider-row">
      <label>Резкость</label>
      <input type="range" min="0" max="100" value="${scanState.sharpness}" oninput="scanState.sharpness=+this.value;this.nextElementSibling.textContent=this.value;applyScan()">
      <span class="val">${scanState.sharpness}</span>
    </div>
    <div class="slider-row">
      <label>Выбеливание фона</label>
      <input type="range" min="0" max="100" value="${scanState.whiten}" oninput="scanState.whiten=+this.value;this.nextElementSibling.textContent=this.value;applyScan()">
      <span class="val">${scanState.whiten}</span>
    </div>
  </div>
  <div class="card">
    <div class="scan-preview">
      <div class="scan-img-wrap">
        <div class="scan-label">Оригинал</div>
        <img id="scanOrig" src="${scanState.img}">
      </div>
      <div class="scan-img-wrap">
        <div class="scan-label">Результат</div>
        <canvas id="scanCanvas"></canvas>
      </div>
    </div>
  </div>`;
  
  setTimeout(()=>applyScan(),100);
}

function loadScanFile(file){
  if(!file)return;
  scanState.fileName=file.name.replace(/\.[^.]+$/,'')+'_enhanced';
  const reader=new FileReader();
  reader.onload=e=>{
    scanState.img=e.target.result;
    scanState.brightness=0;scanState.contrast=30;scanState.sharpness=30;scanState.whiten=20;
    renderScan();
  };
  reader.readAsDataURL(file);
}

function autoEnhance(){
  scanState.brightness=10;scanState.contrast=40;scanState.sharpness=40;scanState.whiten=35;
  renderScan();
}

function resetSliders(){
  scanState.brightness=0;scanState.contrast=0;scanState.sharpness=0;scanState.whiten=0;
  renderScan();
}

function applyScan(){
  const canvas=document.getElementById('scanCanvas');
  const origImg=document.getElementById('scanOrig');
  if(!canvas||!origImg||!origImg.complete)return;
  
  const img=new Image();
  img.onload=()=>{
    canvas.width=img.width;canvas.height=img.height;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0);
    
    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const data=imageData.data;
    
    const br=scanState.brightness/100*255;
    const ct=scanState.contrast/100;
    const factor=(259*(ct*255+255))/(255*(259-ct*255));
    const wh=scanState.whiten/100;
    
    for(let i=0;i<data.length;i+=4){
      let r=data[i],g=data[i+1],bl=data[i+2];
      
      // Brightness
      r+=br;g+=br;bl+=br;
      
      // Contrast
      r=factor*(r-128)+128;
      g=factor*(g-128)+128;
      bl=factor*(bl-128)+128;
      
      // Whiten background (push light grays to white)
      if(wh>0){
        const avg=(r+g+bl)/3;
        if(avg>140){
          const push=wh*(avg-140)/115;
          r=r+(255-r)*push;
          g=g+(255-g)*push;
          bl=bl+(255-bl)*push;
        }
      }
      
      data[i]=Math.max(0,Math.min(255,r));
      data[i+1]=Math.max(0,Math.min(255,g));
      data[i+2]=Math.max(0,Math.min(255,bl));
    }
    
    ctx.putImageData(imageData,0,0);
    
    // Sharpness (unsharp mask approximation)
    if(scanState.sharpness>0){
      const sh=scanState.sharpness/100;
      const tmpCanvas=document.createElement('canvas');
      tmpCanvas.width=canvas.width;tmpCanvas.height=canvas.height;
      const tmpCtx=tmpCanvas.getContext('2d');
      tmpCtx.filter=`blur(1px)`;
      tmpCtx.drawImage(canvas,0,0);
      const blurred=tmpCtx.getImageData(0,0,canvas.width,canvas.height);
      const sharp=ctx.getImageData(0,0,canvas.width,canvas.height);
      const sd=sharp.data;const bd=blurred.data;
      for(let i=0;i<sd.length;i+=4){
        sd[i]=Math.max(0,Math.min(255,sd[i]+sh*2*(sd[i]-bd[i])));
        sd[i+1]=Math.max(0,Math.min(255,sd[i+1]+sh*2*(sd[i+1]-bd[i+1])));
        sd[i+2]=Math.max(0,Math.min(255,sd[i+2]+sh*2*(sd[i+2]-bd[i+2])));
      }
      ctx.putImageData(sharp,0,0);
    }
  };
  img.src=scanState.img;
}

function downloadScan(){
  const canvas=document.getElementById('scanCanvas');
  if(!canvas)return;
  canvas.toBlob(blob=>{
    saveAs(blob,(scanState.fileName||'scan_enhanced')+'.png');
  },'image/png');
}

render();
</script>
