async function genCertFromTemplate(co,cert,r){
const std=CERTS.find(x=>x.id===cert.standard)||{};
const d=co.directorName||'';const dp=co.directorPosition||'Директор';
const prod=cert.productName||std.prod||'';
const bankName=co.bankName||'';
const replacements={
'{{COMPANY_NAME}}':co.companyName||'',
'{{LEGAL_ADDRESS}}':co.legalAddress||'',
'{{POSTAL_ADDRESS}}':co.legalAddress||'',
'{{ACTIVITY_ADDRESS}}':co.legalAddress||'',
'{{BANK_ACCOUNT}}':co.bankAccount||'',
'{{BANK_NAME}}':bankName,
'{{BIK}}':co.bik||'',
'{{BANK_ADDRESS}}':co.bankAddress||'',
'{{UNP}}':co.unp||'',
'{{PHONE}}':co.phone||'',
'{{EMAIL}}':co.email||'',
'{{DIRECTOR_LINE}}':dp+'а '+d+', действующего на основании Устава',
'{{PRODUCT_NAME}}':prod,
'{{TNVED}}':cert.tnved||std.tv||'7308',
'{{OKP}}':cert.okp||std.okp||'',
'{{STANDARD_DOC}}':(std.label||'')+' '+(std.fn||''),
'{{REQUIREMENTS}}':(std.tr||'')+', '+(std.label||''),
'{{PRODUCTION}}':cert.production||'Серийно',
'{{SCHEME}}':cert.scheme||'1С',
'{{DIRECTOR_SHORT}}':d,
'{{RESPONSIBLE}}':(r.name||'')+(r.phone?' '+r.phone:''),
};
// Decode base64 template
const binary=atob(CERT_TEMPLATE_B64);
const bytes=new Uint8Array(binary.length);
for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
// Open as ZIP, replace text in document.xml
const zip=await JSZip.loadAsync(bytes);
let docXml=await zip.file('word/document.xml').async('string');
for(const[placeholder,value]of Object.entries(replacements)){
docXml=docXml.split(placeholder).join(value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
}
zip.file('word/document.xml',docXml);
return await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
}

function docSetType(t){docState.docType=t;renderDoc()}
function docReset(){docState.files=[];docState.currentFile=0;docState.currentPage=0;renderDoc()}
function docSwitchFile(i){docState.currentFile=i;docState.currentPage=0;renderDoc()}
function docSwitchPage(i){docState.currentPage=i;renderDoc()}
function docCountUnprocessed(){let n=0;for(const f of docState.files)for(const p of f.pages)if(!p.processedCanvas)n++;return n}

async function docLoadFiles(fileList){
  if(!fileList||fileList.length===0)return;
  for(const f of fileList){
    try{
      const pages=[];
      if(f.type==='application/pdf' || f.name.toLowerCase().endsWith('.pdf')){
        const ab=await f.arrayBuffer();
        const pdf=await pdfjsLib.getDocument({data:ab}).promise;
        for(let i=1;i<=pdf.numPages;i++){
          const page=await pdf.getPage(i);
          const viewport=page.getViewport({scale:2.0}); // 2x for quality
          const c=document.createElement('canvas');
          c.width=viewport.width;
          c.height=viewport.height;
          await page.render({canvasContext:c.getContext('2d'),viewport}).promise;
          pages.push({originalCanvas:c,processedCanvas:null,rotation:0});
        }
      } else {
        // image
        const url=URL.createObjectURL(f);
        const img=new Image();
        await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url});
        const c=document.createElement('canvas');
        // Limit size for perf (max 2400px longest side)
        const maxSide=2400;
        let w=img.width,h=img.height;
        if(Math.max(w,h)>maxSide){
          const k=maxSide/Math.max(w,h);
          w=Math.round(w*k);h=Math.round(h*k);
        }
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        pages.push({originalCanvas:c,processedCanvas:null,rotation:0});
      }
      docState.files.push({name:f.name,pages});
    }catch(e){
      alert('Ошибка загрузки '+f.name+': '+e.message);
    }
  }
  renderDoc();
}

async function docProcessCurrent(){
  const D=docState;
  const page=D.files[D.currentFile]?.pages[D.currentPage];
  if(!page)return;
  D.processing=true;renderDoc();
  try{
    await new Promise(r=>setTimeout(r,30)); // let UI update
    page.processedCanvas=await docEnhance(page.originalCanvas,D.docType);
    page.rotation=0;
  }catch(e){
    console.error(e);
    alert('Ошибка обработки: '+e.message);
  }
  D.processing=false;renderDoc();
}

async function docProcessAll(){
  const D=docState;
  D.processing=true;renderDoc();
  try{
    for(let fi=0;fi<D.files.length;fi++){
      for(let pi=0;pi<D.files[fi].pages.length;pi++){
        const page=D.files[fi].pages[pi];
        if(!page.processedCanvas){
          D.currentFile=fi;D.currentPage=pi;
          // Yield to UI between pages
          await new Promise(r=>setTimeout(r,30));
          page.processedCanvas=await docEnhance(page.originalCanvas,D.docType);
          page.rotation=0;
        }
      }
    }
  }catch(e){
    console.error(e);
    alert('Ошибка: '+e.message);
  }
  D.processing=false;renderDoc();
}

function docRotate(deg){
  const page=docState.files[docState.currentFile]?.pages[docState.currentPage];
  if(!page||!page.processedCanvas)return;
  const src=page.processedCanvas;
  const c=document.createElement('canvas');
  const ctx=c.getContext('2d');
  if(deg===90){
    c.width=src.height;c.height=src.width;
    ctx.translate(c.width,0);ctx.rotate(Math.PI/2);
    ctx.drawImage(src,0,0);
  } else if(deg===-90){
    c.width=src.height;c.height=src.width;
    ctx.translate(0,c.height);ctx.rotate(-Math.PI/2);
    ctx.drawImage(src,0,0);
  } else if(deg===180){
    c.width=src.width;c.height=src.height;
    ctx.translate(c.width,c.height);ctx.rotate(Math.PI);
    ctx.drawImage(src,0,0);
  }
  page.processedCanvas=c;
  renderDoc();
}

function docDownloadCurrent(){
  const page=docState.files[docState.currentFile]?.pages[docState.currentPage];
  if(!page||!page.processedCanvas)return;
  const file=docState.files[docState.currentFile];
  const name=file.name.replace(/\.(pdf|jpe?g|png|heic)$/i,'');
  const suffix=file.pages.length>1?`_p${docState.currentPage+1}`:'';
  page.processedCanvas.toBlob(b=>saveAs(b,`${name}${suffix}_enhanced.png`),'image/png');
}

async function docDownloadPDF(mode){
  // mode: 'color' | 'bw'
  const D=docState;
  // Collect all processed pages from all files
  const pages=[];
  for(const f of D.files)for(const p of f.pages)if(p.processedCanvas)pages.push({file:f,page:p});
  if(pages.length===0){alert('Нет обработанных страниц');return}
  const {jsPDF}=window.jspdf;
  let pdf=null;
  for(let i=0;i<pages.length;i++){
    const src=pages[i].page.processedCanvas;
    // Choose canvas depending on mode
    let canvas=src;
    if(mode==='bw'){
      canvas=docToBW(src);
    }
    // Orient page (portrait/landscape)
    const isLandscape=canvas.width>canvas.height;
    const w=isLandscape?297:210;
    const h=isLandscape?210:297;
    if(!pdf){
      pdf=new jsPDF({unit:'mm',format:'a4',orientation:isLandscape?'l':'p'});
    } else {
      pdf.addPage('a4',isLandscape?'l':'p');
    }
    // Fit image to page with margin
    const margin=5;
    const pw=w-2*margin,ph=h-2*margin;
    const ar=canvas.width/canvas.height;
    let iw=pw,ih=pw/ar;
    if(ih>ph){ih=ph;iw=ph*ar}
    const x=(w-iw)/2,y=(h-ih)/2;
    const imgData=canvas.toDataURL('image/jpeg',mode==='bw'?0.75:0.85);
    pdf.addImage(imgData,'JPEG',x,y,iw,ih);
  }
  const baseName=D.files[0].name.replace(/\.(pdf|jpe?g|png|heic)$/i,'');
  const suffix=mode==='bw'?'_для_органа':'_обработано';
  pdf.save(`${baseName}${suffix}.pdf`);
}

function docToBW(srcCanvas){
  // Convert already-enhanced canvas to strict B/W (binarized)
  const c=document.createElement('canvas');
  c.width=srcCanvas.width;c.height=srcCanvas.height;
  const ctx=c.getContext('2d');
  ctx.drawImage(srcCanvas,0,0);
  const img=ctx.getImageData(0,0,c.width,c.height);
  const d=img.data;
  for(let i=0;i<d.length;i+=4){
    // Luminance
    const lum=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    // Soft threshold: keep mid-tones slightly
    const v=lum<180?0:(lum<220?Math.round((lum-180)*255/40):255);
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(img,0,0);
  return c;
}

// ============ PURE JS DOCUMENT ENHANCEMENT PIPELINE ============
// Работает на canvas + ImageData без каких-либо нативных библиотек.
// Совместимо по функциональности с прежней OpenCV-версией.

async function docEnhance(srcCanvas,docType){
  // Pipeline:
  //   1) детекция контура документа (если нашли — перспективный warp)
  //   2) детекция ориентации (0/90/180/270)
  //   3) deskew (тонкий поворот по горизонталям)
  //   4) aggressive enhance (фон/контраст/резкость)
  let work=_cloneCanvas(srcCanvas);
  try{
    const pts=_detectDocumentContour(work);
    if(pts){
      work=_fourPointWarp(work,pts);
    }
    work=_detectOrientation(work);
    work=_deskew(work);
    work=_enhanceAggressive(work);
    return work;
  }catch(e){
    console.error('[docEnhance] error, returning original:',e);
    return srcCanvas;
  }
}

// -------- helpers --------
function _cloneCanvas(src){
  const c=document.createElement('canvas');
  c.width=src.width;c.height=src.height;
  c.getContext('2d').drawImage(src,0,0);
  return c;
}
function _canvasGray(srcCanvas){
  // Возвращает Uint8ClampedArray длины w*h (только luminance)
  const ctx=srcCanvas.getContext('2d');
  const img=ctx.getImageData(0,0,srcCanvas.width,srcCanvas.height);
  const d=img.data;
  const out=new Uint8ClampedArray(srcCanvas.width*srcCanvas.height);
  for(let i=0,j=0;i<d.length;i+=4,j++){
    out[j]=(d[i]*299+d[i+1]*587+d[i+2]*114)/1000|0;
  }
  return out;
}
function _resizeGray(src,srcW,srcH,dstW,dstH){
  // Билинейный ресайз одноканального массива (nearest для скорости на downscale)
  const dst=new Uint8ClampedArray(dstW*dstH);
  const xr=srcW/dstW,yr=srcH/dstH;
  for(let y=0;y<dstH;y++){
    const sy=Math.min(srcH-1,(y*yr)|0);
    for(let x=0;x<dstW;x++){
      const sx=Math.min(srcW-1,(x*xr)|0);
      dst[y*dstW+x]=src[sy*srcW+sx];
    }
  }
  return dst;
}
function _gaussBlur(src,w,h,radius){
  // Двухпроходная box-aproximation гауссового размытия
  // radius — целое число пикселей
  const r=Math.max(1,radius|0);
  const size=r*2+1;
  const temp=new Float32Array(w*h);
  const out=new Uint8ClampedArray(w*h);
  // horizontal
  for(let y=0;y<h;y++){
    const row=y*w;
    let sum=0;
    for(let x=-r;x<=r;x++)sum+=src[row+Math.max(0,Math.min(w-1,x))];
    for(let x=0;x<w;x++){
      temp[row+x]=sum/size;
      const add=src[row+Math.min(w-1,x+r+1)];
      const sub=src[row+Math.max(0,x-r)];
      sum+=add-sub;
    }
  }
  // vertical
  for(let x=0;x<w;x++){
    let sum=0;
    for(let y=-r;y<=r;y++)sum+=temp[Math.max(0,Math.min(h-1,y))*w+x];
    for(let y=0;y<h;y++){
      out[y*w+x]=sum/size;
      const add=temp[Math.min(h-1,y+r+1)*w+x];
      const sub=temp[Math.max(0,y-r)*w+x];
      sum+=add-sub;
    }
  }
  return out;
}
function _otsuThreshold(gray,w,h){
  // Otsu → возвращает бинарный массив (0/255)
  const hist=new Uint32Array(256);
  for(let i=0;i<gray.length;i++)hist[gray[i]]++;
  const total=gray.length;
  let sum=0;for(let i=0;i<256;i++)sum+=i*hist[i];
  let sumB=0,wB=0,maxVar=-1,threshold=128;
  for(let t=0;t<256;t++){
    wB+=hist[t];if(wB===0)continue;
    const wF=total-wB;if(wF===0)break;
    sumB+=t*hist[t];
    const mB=sumB/wB,mF=(sum-sumB)/wF;
    const v=wB*wF*(mB-mF)*(mB-mF);
    if(v>maxVar){maxVar=v;threshold=t}
  }
  const out=new Uint8ClampedArray(gray.length);
  for(let i=0;i<gray.length;i++)out[i]=gray[i]>threshold?255:0;
  return out;
}
function _sobelMagnitude(gray,w,h){
  // Вычисляет |∇I| — используется как простая замена Canny
  const out=new Uint8ClampedArray(w*h);
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const i=y*w+x;
      const gx=
        -gray[i-w-1]-2*gray[i-1]-gray[i+w-1]
        +gray[i-w+1]+2*gray[i+1]+gray[i+w+1];
      const gy=
        -gray[i-w-1]-2*gray[i-w]-gray[i-w+1]
        +gray[i+w-1]+2*gray[i+w]+gray[i+w+1];
      const m=Math.hypot(gx,gy);
      out[i]=m>255?255:m|0;
    }
  }
  return out;
}

// -------- 1. Детекция контура документа --------
// Стратегия: ищем большой светлый прямоугольник на тёмном фоне ИЛИ наоборот.
// Работаем на уменьшенной копии (max 800px) для скорости.
function _detectDocumentContour(srcCanvas){
  const W=srcCanvas.width,H=srcCanvas.height;
  const targetMax=800;
  const scale=Math.min(1,targetMax/Math.max(W,H));
  const sw=Math.round(W*scale),sh=Math.round(H*scale);
  // Downscale на canvas для качества (браузер делает смешивание)
  const small=document.createElement('canvas');
  small.width=sw;small.height=sh;
  small.getContext('2d').drawImage(srcCanvas,0,0,sw,sh);
  const gray=_canvasGray(small);
  const blurred=_gaussBlur(gray,sw,sh,2);

  const candidates=[];

  // Стратегия A: Otsu (прямая и инверсная) — ловит контрастные границы
  const otsu=_otsuThreshold(blurred,sw,sh);
  _collectQuadsFromBinary(otsu,sw,sh,candidates,'otsu');
  const otsuInv=new Uint8ClampedArray(otsu.length);
  for(let i=0;i<otsu.length;i++)otsuInv[i]=255-otsu[i];
  _collectQuadsFromBinary(otsuInv,sw,sh,candidates,'otsu-inv');

  // Стратегия B: край по градиенту (простая замена Canny+dilate)
  const sob=_sobelMagnitude(blurred,sw,sh);
  // Пороги — «сильные» градиенты
  const edges=new Uint8ClampedArray(sob.length);
  for(let i=0;i<sob.length;i++)edges[i]=sob[i]>40?255:0;
  // Морфологическое замыкание — чтобы соединить разрывы в рамке
  const dilated=_dilate3x3(edges,sw,sh,2);
  _collectQuadsFromBinary(dilated,sw,sh,candidates,'edges');

  if(candidates.length===0)return null;

  // Оцениваем кандидатов: площадь × симметрия сторон
  const minArea=sw*sh*0.15, maxArea=sw*sh*0.98;
  let best=null,bestScore=0;
  for(const cand of candidates){
    if(cand.area<minArea||cand.area>maxArea)continue;
    const pts=_orderQuad(cand.pts);
    const wA=_dist(pts[1],pts[0]),wB=_dist(pts[2],pts[3]);
    const hA=_dist(pts[3],pts[0]),hB=_dist(pts[2],pts[1]);
    const wsym=Math.min(wA,wB)/(Math.max(wA,wB)+1);
    const hsym=Math.min(hA,hB)/(Math.max(hA,hB)+1);
    const aw=(wA+wB)/2,ah=(hA+hB)/2;
    const ar=Math.min(aw,ah)/(Math.max(aw,ah)+1);
    const score=cand.area*wsym*hsym*(0.3+ar);
    if(score>bestScore){bestScore=score;best={pts}}
  }
  if(!best)return null;
  // Масштабируем обратно к исходному разрешению
  return best.pts.map(p=>[p[0]/scale,p[1]/scale]);
}

function _dilate3x3(bin,w,h,iterations){
  let src=bin,tmp;
  for(let it=0;it<iterations;it++){
    tmp=new Uint8ClampedArray(w*h);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const i=y*w+x;
        if(src[i]){tmp[i]=255;continue}
        let on=false;
        for(let dy=-1;dy<=1&&!on;dy++){
          for(let dx=-1;dx<=1&&!on;dx++){
            const xx=x+dx,yy=y+dy;
            if(xx>=0&&xx<w&&yy>=0&&yy<h&&src[yy*w+xx])on=true;
          }
        }
        tmp[i]=on?255:0;
      }
    }
    src=tmp;
  }
  return src;
}

function _collectQuadsFromBinary(bin,w,h,out,tag){
  // Упрощённый поиск крупных связных компонент (flood fill через BFS),
  // строим bounding box + грубый 4-угольник по крайним точкам.
  const visited=new Uint8Array(w*h);
  const minCompArea=w*h*0.1;
  const queue=new Int32Array(w*h);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const start=y*w+x;
      if(visited[start]||!bin[start])continue;
      // BFS
      let head=0,tail=0;
      queue[tail++]=start;
      visited[start]=1;
      let area=0;
      let minX=x,maxX=x,minY=y,maxY=y;
      // Для грубого 4-угольника найдём экстремальные по диагоналям
      let tlS=Infinity,brS=-Infinity,trD=Infinity,blD=-Infinity;
      let tlP=[x,y],brP=[x,y],trP=[x,y],blP=[x,y];
      while(head<tail){
        const idx=queue[head++];
        const cy=(idx/w)|0,cx=idx-cy*w;
        area++;
        if(cx<minX)minX=cx;if(cx>maxX)maxX=cx;
        if(cy<minY)minY=cy;if(cy>maxY)maxY=cy;
        const s=cx+cy,dd=cy-cx;
        if(s<tlS){tlS=s;tlP=[cx,cy]}
        if(s>brS){brS=s;brP=[cx,cy]}
        if(dd<trD){trD=dd;trP=[cx,cy]}
        if(dd>blD){blD=dd;blP=[cx,cy]}
        // 4-соседи
        if(cx>0){const n=idx-1;if(!visited[n]&&bin[n]){visited[n]=1;queue[tail++]=n}}
        if(cx<w-1){const n=idx+1;if(!visited[n]&&bin[n]){visited[n]=1;queue[tail++]=n}}
        if(cy>0){const n=idx-w;if(!visited[n]&&bin[n]){visited[n]=1;queue[tail++]=n}}
        if(cy<h-1){const n=idx+w;if(!visited[n]&&bin[n]){visited[n]=1;queue[tail++]=n}}
      }
      if(area<minCompArea)continue;
      // Отсеиваем компоненты, примыкающие к границе слишком сильно (вероятно фон)
      const touchesBorder=(minX<=1)+(minY<=1)+(maxX>=w-2)+(maxY>=h-2);
      if(touchesBorder>=3)continue; // компонент упирается в 3+ края — это фон
      out.push({tag,area,pts:[tlP,trP,brP,blP]});
    }
  }
}

function _dist(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1])}
function _orderQuad(pts){
  // TL(min sum), TR(min diff y-x), BR(max sum), BL(max diff y-x)
  const sums=pts.map(p=>p[0]+p[1]);
  const diffs=pts.map(p=>p[1]-p[0]);
  return [
    pts[sums.indexOf(Math.min(...sums))],
    pts[diffs.indexOf(Math.min(...diffs))],
    pts[sums.indexOf(Math.max(...sums))],
    pts[diffs.indexOf(Math.max(...diffs))]
  ];
}

// -------- 2. Перспективный warp --------
function _fourPointWarp(srcCanvas,pts){
  const [tl,tr,br,bl]=_orderQuad(pts);
  const wA=_dist(br,bl),wB=_dist(tr,tl);
  const maxW=Math.round(Math.max(wA,wB));
  const hA=_dist(tr,br),hB=_dist(tl,bl);
  const maxH=Math.round(Math.max(hA,hB));
  if(maxW<10||maxH<10)return _cloneCanvas(srcCanvas);
  // Считаем homography-матрицу из 4 точек через линейную систему 8x8
  const H=_computeHomography(
    [[0,0],[maxW-1,0],[maxW-1,maxH-1],[0,maxH-1]],
    [tl,tr,br,bl]
  );
  if(!H)return _cloneCanvas(srcCanvas);
  // Перебираем dst-пиксели, берём пикселы из src через inverse-map H
  const srcCtx=srcCanvas.getContext('2d');
  const srcImg=srcCtx.getImageData(0,0,srcCanvas.width,srcCanvas.height);
  const sd=srcImg.data, SW=srcCanvas.width, SH=srcCanvas.height;
  const dst=document.createElement('canvas');
  dst.width=maxW;dst.height=maxH;
  const dctx=dst.getContext('2d');
  const out=dctx.createImageData(maxW,maxH);
  const od=out.data;
  for(let y=0;y<maxH;y++){
    for(let x=0;x<maxW;x++){
      // Применяем H к (x,y) → (sx,sy) в исходнике
      const denom=H[6]*x+H[7]*y+H[8];
      const sxf=(H[0]*x+H[1]*y+H[2])/denom;
      const syf=(H[3]*x+H[4]*y+H[5])/denom;
      const k=(y*maxW+x)*4;
      if(sxf<0||sxf>=SW-1||syf<0||syf>=SH-1){
        od[k]=od[k+1]=od[k+2]=255;od[k+3]=255;
        continue;
      }
      // Билинейная интерполяция
      const sx0=sxf|0,sy0=syf|0;
      const fx=sxf-sx0,fy=syf-sy0;
      const i00=(sy0*SW+sx0)*4;
      const i10=i00+4;
      const i01=i00+SW*4;
      const i11=i01+4;
      for(let c=0;c<3;c++){
        const v=sd[i00+c]*(1-fx)*(1-fy)+sd[i10+c]*fx*(1-fy)
               +sd[i01+c]*(1-fx)*fy   +sd[i11+c]*fx*fy;
        od[k+c]=v|0;
      }
      od[k+3]=255;
    }
  }
  dctx.putImageData(out,0,0);
  return dst;
}

function _computeHomography(src,dst){
  // src[i] → dst[i], 4 пары точек. Решаем 8x8 линейную систему.
  // Возвращает 3x3 матрицу [h0..h8] (h8=1).
  const A=[],b=[];
  for(let i=0;i<4;i++){
    const [x,y]=src[i],[X,Y]=dst[i];
    A.push([x,y,1,0,0,0,-X*x,-X*y]);b.push(X);
    A.push([0,0,0,x,y,1,-Y*x,-Y*y]);b.push(Y);
  }
  const h=_solveLinear(A,b);
  if(!h)return null;
  return [h[0],h[1],h[2],h[3],h[4],h[5],h[6],h[7],1];
}
function _solveLinear(A,b){
  // Простой метод Гаусса с частичным выбором главного элемента
  const n=A.length;
  const M=A.map((row,i)=>row.concat([b[i]]));
  for(let i=0;i<n;i++){
    // pivot
    let maxR=i,maxV=Math.abs(M[i][i]);
    for(let r=i+1;r<n;r++){
      const v=Math.abs(M[r][i]);
      if(v>maxV){maxV=v;maxR=r}
    }
    if(maxV<1e-12)return null;
    if(maxR!==i){const t=M[i];M[i]=M[maxR];M[maxR]=t}
    // eliminate
    for(let r=i+1;r<n;r++){
      const f=M[r][i]/M[i][i];
      for(let c=i;c<=n;c++)M[r][c]-=f*M[i][c];
    }
  }
  // back-substitution
  const x=new Array(n);
  for(let i=n-1;i>=0;i--){
    let s=M[i][n];
    for(let c=i+1;c<n;c++)s-=M[i][c]*x[c];
    x[i]=s/M[i][i];
  }
  return x;
}

// -------- 3. Детекция ориентации 0/90/180/270 --------
function _detectOrientation(srcCanvas){
  // Скоринг: 1) row_std/col_std (горизонтальные линии текста дают высокий rowStd)
  //          2) peak в верхней трети (заголовки/номера у верха)
  const gray=_canvasGray(srcCanvas);
  const W=srcCanvas.width,H=srcCanvas.height;
  const targetMax=600;
  const scale=Math.min(1,targetMax/Math.max(W,H));
  const sw=Math.max(1,Math.round(W*scale)),sh=Math.max(1,Math.round(H*scale));
  const small=_resizeGray(gray,W,H,sw,sh);

  function scoreRotated(arr,w,h){
    // Ожидаем бинаризованный массив (0/255). Считаем rowSums / colSums.
    const rowSums=new Float64Array(h);
    const colSums=new Float64Array(w);
    for(let y=0;y<h;y++){
      let s=0;
      for(let x=0;x<w;x++){const v=arr[y*w+x]?1:0;s+=v;colSums[x]+=v}
      rowSums[y]=s;
    }
    const rowStd=_stdDev(rowSums),colStd=_stdDev(colSums);
    const line=rowStd/(colStd+1);
    // smoothed max в трети
    const smoothed=new Float64Array(h);
    for(let i=0;i<h;i++){
      let s=0,n=0;
      for(let k=-2;k<=2;k++){const j=i+k;if(j>=0&&j<h){s+=rowSums[j];n++}}
      smoothed[i]=s/n;
    }
    const t1=(h/3)|0,t2=(2*h/3)|0;
    let topM=0,midM=0,botM=0;
    for(let i=0;i<t1;i++)if(smoothed[i]>topM)topM=smoothed[i];
    for(let i=t1;i<t2;i++)if(smoothed[i]>midM)midM=smoothed[i];
    for(let i=t2;i<h;i++)if(smoothed[i]>botM)botM=smoothed[i];
    const header=topM/(midM+botM+1);
    return line*(1+header);
  }
  // Инвертированная бинаризация: тёмный текст → 1
  const bin=new Uint8ClampedArray(small.length);
  const thr=_otsuLevel(small);
  for(let i=0;i<small.length;i++)bin[i]=small[i]<thr?255:0;

  // Генерируем 4 варианта
  const variants=[
    {code:0,arr:bin,w:sw,h:sh},
    {code:1,arr:_rotate90(bin,sw,sh),w:sh,h:sw},
    {code:2,arr:_rotate180(bin,sw,sh),w:sw,h:sh},
    {code:3,arr:_rotate270(bin,sw,sh),w:sh,h:sw}
  ];
  let bestCode=0,bestScore=-1;
  for(const v of variants){
    const s=scoreRotated(v.arr,v.w,v.h);
    if(s>bestScore){bestScore=s;bestCode=v.code}
  }
  if(bestCode===0)return srcCanvas;
  return _rotateCanvas(srcCanvas,bestCode*90);
}
function _stdDev(arr){
  let m=0;for(let i=0;i<arr.length;i++)m+=arr[i];m/=arr.length;
  let s=0;for(let i=0;i<arr.length;i++){const d=arr[i]-m;s+=d*d}
  return Math.sqrt(s/arr.length);
}
function _otsuLevel(gray){
  const hist=new Uint32Array(256);
  for(let i=0;i<gray.length;i++)hist[gray[i]]++;
  const total=gray.length;
  let sum=0;for(let i=0;i<256;i++)sum+=i*hist[i];
  let sumB=0,wB=0,maxVar=-1,thr=128;
  for(let t=0;t<256;t++){
    wB+=hist[t];if(wB===0)continue;
    const wF=total-wB;if(wF===0)break;
    sumB+=t*hist[t];
    const mB=sumB/wB,mF=(sum-sumB)/wF;
    const v=wB*wF*(mB-mF)*(mB-mF);
    if(v>maxVar){maxVar=v;thr=t}
  }
  return thr;
}
function _rotate90(src,w,h){ // clockwise
  const dst=new Uint8ClampedArray(w*h);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++)dst[x*h+(h-1-y)]=src[y*w+x];
  return dst;
}
function _rotate180(src,w,h){
  const dst=new Uint8ClampedArray(w*h);
  for(let i=0;i<src.length;i++)dst[src.length-1-i]=src[i];
  return dst;
}
function _rotate270(src,w,h){ // counter-clockwise
  const dst=new Uint8ClampedArray(w*h);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++)dst[(w-1-x)*h+y]=src[y*w+x];
  return dst;
}
function _rotateCanvas(srcCanvas,deg){
  const r=((deg%360)+360)%360;
  const c=document.createElement('canvas');
  const ctx=c.getContext('2d');
  if(r===90){c.width=srcCanvas.height;c.height=srcCanvas.width;ctx.translate(c.width,0);ctx.rotate(Math.PI/2);ctx.drawImage(srcCanvas,0,0)}
  else if(r===180){c.width=srcCanvas.width;c.height=srcCanvas.height;ctx.translate(c.width,c.height);ctx.rotate(Math.PI);ctx.drawImage(srcCanvas,0,0)}
  else if(r===270){c.width=srcCanvas.height;c.height=srcCanvas.width;ctx.translate(0,c.height);ctx.rotate(-Math.PI/2);ctx.drawImage(srcCanvas,0,0)}
  else {c.width=srcCanvas.width;c.height=srcCanvas.height;ctx.drawImage(srcCanvas,0,0)}
  return c;
}

// -------- 4. Deskew (тонкий поворот по горизонталям) --------
function _deskew(srcCanvas){
  const gray=_canvasGray(srcCanvas);
  const W=srcCanvas.width,H=srcCanvas.height;
  const targetMax=800;
  const scale=Math.min(1,targetMax/Math.max(W,H));
  const sw=Math.max(1,Math.round(W*scale)),sh=Math.max(1,Math.round(H*scale));
  const small=_resizeGray(gray,W,H,sw,sh);
  // Бинаризация (тёмный текст)
  const thr=_otsuLevel(small);
  const bin=new Uint8ClampedArray(small.length);
  for(let i=0;i<small.length;i++)bin[i]=small[i]<thr?1:0;
  // Для каждого малого угла [-5..5]° считаем скор "острых" горизонтальных линий
  // Скор: сумма квадратов rowSums (когда текст горизонтален — rowSums имеют пики)
  let bestAng=0,bestSc=-1;
  for(let ang=-5;ang<=5;ang+=0.5){
    const rad=ang*Math.PI/180;
    const s=_rowStrengthAtAngle(bin,sw,sh,rad);
    if(s>bestSc){bestSc=s;bestAng=ang}
  }
  if(Math.abs(bestAng)<0.3)return srcCanvas;
  // Применяем поворот к исходному canvas
  return _rotateByAngle(srcCanvas,bestAng);
}
function _rowStrengthAtAngle(bin,w,h,rad){
  // Для каждой "строки" ( наклонной под углом rad ) считаем сумму.
  // Используем сглаживание: идём по y, для каждого x считаем сдвинутый y' = y + x*tan(rad)
  // Чтобы было дёшево: оцениваем по диагонали семплы с шагом 1 по y.
  const tan=Math.tan(rad);
  const H=h;
  // Для каждой строки y считаем количество 1-пикселей; но y'=y0+x*tan
  // Мы хотим найти y0 такие, где по строке много тёмных пикселей.
  // Реализация: накопитель rowSums[y0] = Σ_x bin[y0 + x*tan][x]
  const sums=new Float64Array(H);
  for(let y=0;y<H;y++){
    let s=0;
    for(let x=0;x<w;x++){
      const yy=Math.round(y+x*tan);
      if(yy>=0&&yy<H)s+=bin[yy*w+x];
    }
    sums[y]=s;
  }
  // Скор — сумма квадратов (острее пики → выше скор)
  let sc=0;for(let i=0;i<H;i++)sc+=sums[i]*sums[i];
  return sc;
}
function _rotateByAngle(srcCanvas,degrees){
  const W=srcCanvas.width,H=srcCanvas.height;
  const c=document.createElement('canvas');
  c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.translate(W/2,H/2);
  ctx.rotate(-degrees*Math.PI/180);
  ctx.translate(-W/2,-H/2);
  ctx.drawImage(srcCanvas,0,0);
  return c;
}

// -------- 5. Aggressive enhance (фон/контраст/резкость) --------
function _enhanceAggressive(srcCanvas){
  const W=srcCanvas.width,H=srcCanvas.height;
  const ctx=srcCanvas.getContext('2d');
  const img=ctx.getImageData(0,0,W,H);
  const d=img.data;
  // 1) gray в отдельный массив
  const gray=new Uint8ClampedArray(W*H);
  for(let i=0,j=0;i<d.length;i+=4,j++){
    gray[j]=(d[i]*299+d[i+1]*587+d[i+2]*114)/1000|0;
  }
  // 2) нормализация освещённости: gray / blurred_background * 255
  const kRadius=Math.max(5,(Math.max(W,H)/50)|0);
  const bg=_gaussBlur(gray,W,H,kRadius);
  const norm=new Uint8ClampedArray(W*H);
  for(let i=0;i<gray.length;i++){
    const v=bg[i]?(gray[i]*255/bg[i]):255;
    norm[i]=v>255?255:(v<0?0:v|0);
  }
  // 3) упрощённый CLAHE (глобальное растяжение 2–98 процентилей)
  const stretched=_contrastStretch(norm,2,98);
  // 4) gamma 1/1.2 — чуть осветляет средние тона
  const gamma=new Uint8ClampedArray(W*H);
  for(let i=0;i<256;i++){/*lookup*/}
  const lut=new Uint8ClampedArray(256);
  for(let i=0;i<256;i++)lut[i]=Math.round(Math.pow(i/255,1/1.2)*255);
  for(let i=0;i<stretched.length;i++)gamma[i]=lut[stretched[i]];
  // 5) unsharp mask: gamma * 1.8 - blur(gamma, r=3) * 0.8
  const gblur=_gaussBlur(gamma,W,H,3);
  const sharp=new Uint8ClampedArray(W*H);
  for(let i=0;i<gamma.length;i++){
    const v=gamma[i]*1.8-gblur[i]*0.8;
    sharp[i]=v>255?255:(v<0?0:v|0);
  }
  // 6) white-point: пикселы >230 → 255 (убираем серый фон)
  for(let i=0;i<sharp.length;i++)if(sharp[i]>230)sharp[i]=255;

  // Возвращаем RGBA canvas
  const out=document.createElement('canvas');
  out.width=W;out.height=H;
  const octx=out.getContext('2d');
  const oimg=octx.createImageData(W,H);
  const od=oimg.data;
  for(let i=0,j=0;j<sharp.length;i+=4,j++){
    od[i]=od[i+1]=od[i+2]=sharp[j];od[i+3]=255;
  }
  octx.putImageData(oimg,0,0);
  return out;
}
function _contrastStretch(src,lowPct,highPct){
  const hist=new Uint32Array(256);
  for(let i=0;i<src.length;i++)hist[src[i]]++;
  const total=src.length;
  const lowTarget=total*lowPct/100,highTarget=total*highPct/100;
  let acc=0,lo=0,hi=255;
  for(let i=0;i<256;i++){acc+=hist[i];if(acc>=lowTarget){lo=i;break}}
  acc=0;
  for(let i=0;i<256;i++){acc+=hist[i];if(acc>=highTarget){hi=i;break}}
  if(hi<=lo+5){hi=lo+5}
  const range=hi-lo;
  const out=new Uint8ClampedArray(src.length);
  for(let i=0;i<src.length;i++){
    const v=(src[i]-lo)*255/range;
    out[i]=v>255?255:(v<0?0:v|0);
  }
  return out;
}

function diplomSetMode(m){
  diplomState.mode=m;
  diplomState.detectedSpecs=[];
  diplomState.checkSpec=null;
  renderDiplom();
}

function diplomFilterList(q){
  const s=(q||'').toLowerCase().trim();
  document.querySelectorAll('#diplomList .dipl-item').forEach(it=>{
    it.style.display=s===''||it.dataset.n.includes(s)?'':'none';
  });
}

function diplomSelectCode(c){
  diplomState.code=c;
  renderDiplom();
}

function diplomParseText(txt){
  if(!txt)return null;
  let s=txt.replace(/[,;]/g,' ').replace(/\s+/g,' ').trim();
  const patterns=[
    /(\d{2}\s+\d{2}\s+\d{2}\s+\d{2})(?!\d)/,
    /(\d{2}\s+\d{2}\s+\d{2}(?:-\d{1,2})?)(?!\d)/,
    /(\d{2}\s+\d{2}(?:-\d{1,2})?)(?!\d)/,
  ];
  for(const p of patterns){
    const m=s.match(p);
    if(m)return m[1].replace(/\s+/g,' ').trim();
  }
  const m2=s.match(/\b(\d{2})\b/);
  if(m2 && DIPLOM_DATA.codes[m2[1]])return m2[1];
  return null;
}

function diplomLevelByCode(code){
  if(!code)return 'hi';
  const groups=code.split(/\s+/);
  if(groups.length>=3 && /^3/.test(groups[2]))return 'sr';
  return 'hi';
}

    if(!D.code){alert('Выберите специальность из списка');return}
    code=D.code;

    const raw=(document.getElementById('diplomCodeIn')?.value||D.code).trim();
    if(!raw){alert('Введите код');return}
    code=raw.replace(/\s+/g,' ');
    D.code=code;
  }

  let level=D.edu;
  if(level==='auto')level=diplomLevelByCode(code);

  const userGroup=code.split(' ')[0];
  const userFirst2=code.split(' ').slice(0,2).join(' ');
  const matches=[];
  for(const r of DIPLOM_DATA.records){
    const list=level==='hi'?r.hi:r.sr;
    let matchedVia=null;
    for(const c of list){
      const parts=c.split(';').map(p=>p.trim());
      if(parts.includes(code)){matchedVia={recCode:c,type:'exact'};break}
      if(parts.includes(userGroup)){matchedVia={recCode:c,type:'group'};break}
      if(parts.includes(userFirst2)){matchedVia={recCode:c,type:'group2'};break}
    }
    if(matchedVia)matches.push({rec:r,via:matchedVia});
  }
  D.detectedSpecs=matches;
  D.detectedCode=code;
  D.detectedLevel=level;
  renderDiplomResult();
}

function renderDiplomResult(){
  const D=diplomState;
  const el=document.getElementById('diplomResult');
  if(!el)return;
  const codeName=DIPLOM_DATA.codes[D.detectedCode]||'(не в справочнике)';
  const lvlText=D.detectedLevel==='hi'?'Высшее':'Среднее специальное';
  const matches=D.detectedSpecs||[];

  const byActivity={};
  for(const m of matches){
    const a=m.rec.a;
    if(!byActivity[a])byActivity[a]=[];
    byActivity[a].push(m);
  }

  const allSpecs=DIPLOM_DATA.records.map(r=>({i:r.i,a:r.a,sp:r.sp}));
  const byActAll={};
  for(const s of allSpecs){(byActAll[s.a]=byActAll[s.a]||[]).push(s)}

  el.innerHTML=`
  <div class="card" style="background:${matches.length>0?'#f0fdf4':'#fef2f2'};border:1px solid ${matches.length>0?'#86efac':'#fecaca'}">
    <div style="font-size:13px;color:#555;margin-bottom:4px">Распознано:</div>
    <div style="font-size:16px;font-weight:600">${E(codeName)} <span style="font-family:monospace;color:#888;font-weight:normal;font-size:14px">(${E(D.detectedCode)})</span></div>
    <div style="font-size:13px;color:#555;margin-top:4px">Уровень: <b>${lvlText}</b> ${D.edu==='auto'?'<span style="color:#888">(определён автоматически по коду)</span>':''}</div>
    <div style="margin-top:10px;font-size:14px">${matches.length>0?`✅ <b>Подходит под ${matches.length} специализаци${matches.length===1?'ю':(matches.length<5?'и':'й')} аттестации</b>`:'❌ <b>Не найдено подходящих специализаций</b> для этого кода и уровня образования'}</div>
  </div>

  ${matches.length>0?`
  <div class="card">
    <div class="card-title">📋 Подходящие специализации аттестации</div>
    ${Object.entries(byActivity).map(([act,arr])=>`
      <div style="margin-bottom:14px">
        <div style="font-weight:600;color:#1a1a2e;font-size:13px;margin-bottom:6px;padding:6px 10px;background:#f3f4f6;border-radius:6px">${E(act)} <span style="color:#888;font-weight:normal">— ${arr.length}</span></div>
        ${arr.map(m=>`
          <div style="padding:8px 12px;margin-bottom:4px;border-left:3px solid #3b82f6;background:#f9fafb;border-radius:0 6px 6px 0;font-size:13px;display:flex;justify-content:space-between;gap:10px;align-items:start;flex-wrap:wrap">
            <span style="flex:1;min-width:200px"><b style="color:#1e40af">#${m.rec.i}</b> ${E(m.rec.sp)}</span>
            ${m.via.type!=='exact'?`<span style="font-size:11px;color:#a16207;background:#fef3c7;padding:2px 6px;border-radius:4px;white-space:nowrap" title="${m.via.type==='group'?'Запись содержит групповой код (только первая пара)':'Совпадение по первым 2 парам кода'}">${m.via.type==='group'?'группа':'гр.2'}: ${E(m.via.recCode)}</span>`:''}
          </div>
        `).join('')}
      </div>
    `).join('')}
  </div>
  `:''}

  <div class="card">
    <div class="card-title">🎯 Проверить конкретную специализацию</div>
    <div style="font-size:13px;color:#666;margin-bottom:8px">Подходит ли этот диплом под выбранную специализацию?</div>
    <select id="checkSpecSel" onchange="diplomState.checkSpec=this.value;diplomCheckSpec()" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-family:inherit;font-size:14px;box-sizing:border-box">
      <option value="">— выберите специализацию —</option>
      ${Object.entries(byActAll).map(([a,arr])=>`
        <optgroup label="${E(a)}">
          ${arr.map(s=>`<option value="${s.i}" ${String(D.checkSpec)===String(s.i)?'selected':''}>#${s.i} — ${E(s.sp.substring(0,110))}</option>`).join('')}
        </optgroup>
      `).join('')}
    </select>
    <div id="checkSpecResult" style="margin-top:12px"></div>
  </div>
  `;
  if(D.checkSpec)diplomCheckSpec();
}

function diplomCheckSpec(){
  const D=diplomState;
  const i=parseInt(D.checkSpec);
  const rec=DIPLOM_DATA.records.find(r=>r.i===i);
  const el=document.getElementById('checkSpecResult');
  if(!rec||!el){if(el)el.innerHTML='';return}
  const code=D.detectedCode;
  const level=D.detectedLevel;
  const list=level==='hi'?rec.hi:rec.sr;
  const listOther=level==='hi'?rec.sr:rec.hi;
  const g1=code.split(' ')[0];
  const g12=code.split(' ').slice(0,2).join(' ');

  function fits(lst){
    for(const c of lst){
      const parts=c.split(';').map(p=>p.trim());
      if(parts.includes(code))return {type:'exact',match:c};
      if(parts.includes(g1))return {type:'group',match:c};
      if(parts.includes(g12))return {type:'group2',match:c};
    }
    return null;
  }

  const here=fits(list);
  const elsewhere=fits(listOther);
  const otherLvl=level==='hi'?'среднего специального':'высшего';

  let html='';
  if(here){
    html=`<div style="padding:12px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;font-size:14px">
      ✅ <b>Подходит</b> под уровень <b>${level==='hi'?'высшее':'среднее специальное'}</b>
      <div style="font-size:12px;color:#555;margin-top:6px">Специализация: ${E(rec.sp)}</div>
      ${here.type!=='exact'?`<div style="font-size:12px;color:#a16207;margin-top:4px">Совпадение по ${here.type==='group'?'группе (первая пара кода)':'первым двум парам кода'}: ${E(here.match)}</div>`:''}
    </div>`;
  } else if(elsewhere){
    html=`<div style="padding:12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;font-size:14px">
      ⚠️ <b>Не подходит для ${level==='hi'?'высшего':'среднего специального'}</b>, но подходит для уровня <b>${level==='hi'?'среднее специальное':'высшее'}</b>
      <div style="font-size:12px;color:#555;margin-top:6px">Проверьте уровень образования в дипломе.</div>
    </div>`;
  } else {
    html=`<div style="padding:12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;font-size:14px">
      ❌ <b>Не подходит</b> — эта специальность отсутствует в списке допустимых для данной специализации
      <div style="font-size:12px;color:#555;margin-top:8px">Допустимые специальности для уровня <b>${level==='hi'?'высшее':'среднее специальное'}</b> (${list.length}):</div>
      <div style="font-size:12px;color:#333;margin-top:6px;max-height:160px;overflow-y:auto;padding:8px;background:#fff;border-radius:6px;border:1px solid #f3f4f6">
        ${list.length>0?list.map(c=>{const n=DIPLOM_DATA.codes[c]||'?';return `• ${E(n)} <span style="font-family:monospace;color:#888">${E(c)}</span>`}).join('<br>'):'<i>нет допустимых специальностей для этого уровня — выбрана неподходящая ступень образования</i>'}
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

render();
</script>
</body>
</html>
